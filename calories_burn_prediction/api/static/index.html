<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calories Burn Predictor</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
        }
        body {
            background-color: #111115;
            color: #ffffff;
            display: flex;
            justify-content: center;
            padding: 50px 20px;
        }
        .container {
            width: 100%;
            max-width: 600px;
        }
        h1 {
            font-size: 2.2rem;
            font-weight: 700;
            margin-bottom: 20px;
        }
        .subtitle {
            font-size: 0.95rem;
            margin-bottom: 30px;
        }
        .form-group {
            margin-bottom: 20px;
        }
        label {
            display: block;
            font-size: 0.85rem;
            margin-bottom: 8px;
        }
        .input-wrapper {
            position: relative;
            width: 100%;
            background-color: #24242b;
            border-radius: 6px;
            display: flex;
            align-items: center;
        }
        .input-wrapper input, .input-wrapper select {
            width: 100%;
            background-color: transparent;
            border: none;
            color: #ffffff;
            padding: 12px 16px;
            font-size: 0.95rem;
            outline: none;
            appearance: none;
            -moz-appearance: textfield;
        }
        /* Hide default spin buttons */
        .input-wrapper input::-webkit-outer-spin-button,
        .input-wrapper input::-webkit-inner-spin-button {
            -webkit-appearance: none;
            margin: 0;
        }
        
        /* Custom Stepper Buttons for number inputs */
        .stepper {
            display: flex;
            align-items: center;
            padding-right: 12px;
            gap: 12px;
            color: #a1a1aa;
        }
        .step-btn {
            background: none;
            border: none;
            color: #ffffff;
            cursor: pointer;
            font-size: 1.2rem;
            font-weight: bold;
        }
        /* Chevron for select */
        .chevron {
            position: absolute;
            right: 16px;
            top: 50%;
            transform: translateY(-50%);
            pointer-events: none;
        }
        /* Predict Button */
        button[type="submit"] {
            background-color: transparent;
            border: 1px solid #3f3f46;
            color: #ffffff;
            padding: 10px 24px;
            border-radius: 6px;
            font-size: 0.95rem;
            cursor: pointer;
            margin-top: 10px;
        }
        button[type="submit"]:hover {
            background-color: rgba(255, 255, 255, 0.05);
        }
        
        #result-box {
            margin-top: 30px;
            display: none;
            background-color: #24242b;
            padding: 20px;
            border-radius: 6px;
            border: 1px solid #3f3f46;
        }
        #result-val {
            font-size: 1.5rem;
            font-weight: bold;
            color: #4ade80;
        }
    </style>
</head>
<body>

<div class="container">
    <h1>Calories Burn Predictor</h1>
    <div class="subtitle">Enter workout details</div>

    <form id="predictionForm">
        
        <div class="form-group">
            <label>Duration (in mins)</label>
            <div class="input-wrapper">
                <input type="number" id="duration" value="45" min="1" max="300" required>
                <div class="stepper">
                    <button type="button" class="step-btn" onclick="step('duration', -1)">−</button>
                    <button type="button" class="step-btn" onclick="step('duration', 1)">+</button>
                </div>
            </div>
        </div>

        <div class="form-group">
            <label>Average Heart Rate (bpm)</label>
            <div class="input-wrapper">
                <input type="number" id="heart_rate" value="145" min="40" max="220" required>
                <div class="stepper">
                    <button type="button" class="step-btn" onclick="step('heart_rate', -1)">−</button>
                    <button type="button" class="step-btn" onclick="step('heart_rate', 1)">+</button>
                </div>
            </div>
        </div>

        <div class="form-group">
            <label>Body Temperature (°C)</label>
            <div class="input-wrapper">
                <input type="number" id="body_temp" value="39.2" step="0.1" min="35.0" max="42.0" required>
                <div class="stepper">
                    <button type="button" class="step-btn" onclick="step('body_temp', -0.1)">−</button>
                    <button type="button" class="step-btn" onclick="step('body_temp', 0.1)">+</button>
                </div>
            </div>
        </div>

        <div class="form-group">
            <label>Age</label>
            <div class="input-wrapper">
                <input type="number" id="age" value="28" min="18" max="100" required>
                <div class="stepper">
                    <button type="button" class="step-btn" onclick="step('age', -1)">−</button>
                    <button type="button" class="step-btn" onclick="step('age', 1)">+</button>
                </div>
            </div>
        </div>

        <div class="form-group">
            <label>Gender</label>
            <div class="input-wrapper">
                <select id="gender" required>
                    <option value="male">Male</option>
                    <option value="female" selected>Female</option>
                </select>
                <svg class="chevron" width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="6 9 12 15 18 9"></polyline></svg>
            </div>
        </div>

        <div class="form-group">
            <label>Height (in cm)</label>
            <div class="input-wrapper">
                <input type="number" id="height" value="165" step="0.5" min="100" max="250" required>
                <div class="stepper">
                    <button type="button" class="step-btn" onclick="step('height', -0.5)">−</button>
                    <button type="button" class="step-btn" onclick="step('height', 0.5)">+</button>
                </div>
            </div>
        </div>

        <div class="form-group">
            <label>Weight (in kg)</label>
            <div class="input-wrapper">
                <input type="number" id="weight" value="65" step="0.5" min="30" max="200" required>
                <div class="stepper">
                    <button type="button" class="step-btn" onclick="step('weight', -0.5)">−</button>
                    <button type="button" class="step-btn" onclick="step('weight', 0.5)">+</button>
                </div>
            </div>
        </div>

        <button type="submit">Predict</button>
    </form>
    
    <div id="result-box">
        <div id="result-val">--</div>
        <div style="font-size: 0.9rem; color: #a1a1aa; margin-top: 4px;">Predicted Calories Burned</div>
    </div>
</div>

<script>
    function step(id, amount) {
        const el = document.getElementById(id);
        const val = parseFloat(el.value);
        if (!isNaN(val)) {
            // Fix JS floating point drift for steps like 0.1
            const precision = el.step && el.step.includes('.') ? el.step.split('.')[1].length : 0;
            const newVal = parseFloat((val + amount).toFixed(precision));
            
            if (el.max && newVal > parseFloat(el.max)) return;
            if (el.min && newVal < parseFloat(el.min)) return;
            
            el.value = newVal;
        }
    }

    document.getElementById('predictionForm').addEventListener('submit', async function(e) {
        e.preventDefault();
        
        const resultBox = document.getElementById('result-box');
        const resultVal = document.getElementById('result-val');
        
        resultBox.style.display = 'none';
        
        const payload = {
            age: parseInt(document.getElementById('age').value),
            gender: document.getElementById('gender').value,
            height: parseFloat(document.getElementById('height').value),
            weight: parseFloat(document.getElementById('weight').value),
            duration: parseInt(document.getElementById('duration').value),
            heart_rate: parseInt(document.getElementById('heart_rate').value),
            body_temp: parseFloat(document.getElementById('body_temp').value)
        };

        try {
            const response = await fetch('/predict', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(payload)
            });

            const data = await response.json();

            if (response.ok) {
                resultVal.innerText = data.predicted_calories + " kcal";
                resultVal.style.color = "#4ade80";
                resultBox.style.display = 'block';
            } else {
                resultVal.innerText = "Error: " + (data.detail || "Unable to compute");
                resultVal.style.color = "#ef4444";
                resultBox.style.display = 'block';
            }
        } catch (error) {
            resultVal.innerText = "Error: API unreachable.";
            resultVal.style.color = "#ef4444";
            resultBox.style.display = 'block';
        }
    });
</script>

</body>
</html>
